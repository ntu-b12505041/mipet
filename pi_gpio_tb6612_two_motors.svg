<svg xmlns="http://www.w3.org/2000/svg" width="1350" height="950" viewBox="0 0 1350 950">
  <defs>
    <style>
      .bg{fill:#f7f8fb}.board{fill:#2f8f56;stroke:#1f6b3e;stroke-width:4}.port{fill:#d6dbe3;stroke:#8b95a1;stroke-width:3}
      .header{fill:#171b22;stroke:#0b0f14;stroke-width:3}.pin{fill:#2a2f38;stroke:#0b0f14;stroke-width:2}
      .use{fill:#ffb020;stroke:#9a5b00;stroke-width:3}.v33{fill:#ef4444;stroke:#991b1b;stroke-width:3}.gnd{fill:#111827;stroke:#000;stroke-width:3}
      .tb{fill:#fff;stroke:#9ca3af;stroke-width:4}.tbpin{fill:#eef2ff;stroke:#6366f1;stroke-width:2}.box{fill:#fff7ed;stroke:#f97316;stroke-width:3}
      .warn{fill:#fee2e2;stroke:#ef4444;stroke-width:3}.motor{fill:#e0f2fe;stroke:#0284c7;stroke-width:3}
      .title{font-family:Arial,"Noto Sans TC",sans-serif;font-size:34px;font-weight:700;fill:#111827}.h2{font-family:Arial,"Noto Sans TC",sans-serif;font-size:24px;font-weight:700;fill:#111827}
      .label{font-family:Arial,"Noto Sans TC",sans-serif;font-size:20px;fill:#111827}.small{font-family:Arial,"Noto Sans TC",sans-serif;font-size:16px;fill:#111827}
      .tiny{font-family:Arial,"Noto Sans TC",sans-serif;font-size:12px;fill:#111827}.num{font-family:Arial,"Noto Sans TC",sans-serif;font-size:13px;font-weight:700;fill:#fff;text-anchor:middle;dominant-baseline:central}
      .wire{fill:none;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.red{stroke:#ef4444}.black{stroke:#111827}.blue{stroke:#2563eb}.orange{stroke:#f97316}.green{stroke:#16a34a}.purple{stroke:#7c3aed}.pink{stroke:#db2777}.teal{stroke:#0d9488}.gray{stroke:#64748b}
    </style>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#ef4444"/></marker>
    <marker id="ab" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#111827"/></marker>
    <marker id="ablue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
    <marker id="ao" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#f97316"/></marker>
    <marker id="ag" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/></marker>
    <marker id="ap" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/></marker>
    <marker id="apk" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#db2777"/></marker>
    <marker id="at" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#0d9488"/></marker>
    <marker id="agy" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/></marker>
  </defs>

  <rect class="bg" width="1350" height="950"/>
  <text class="title" x="48" y="58">Raspberry Pi + TB6612：兩顆馬達一次測試</text>
  <text class="label" x="48" y="94">方向：GPIO 排針在上方，USB / 網路孔在右邊。照「實體腳位 Pin」數，比照 GPIO 名稱不容易混亂。</text>

  <rect class="board" x="55" y="145" width="745" height="420" rx="26"/>
  <text class="h2" x="92" y="193" fill="#fff">Raspberry Pi 正面</text>
  <text class="small" x="92" y="222" fill="#e7f7ed">右邊看到 USB / 網路孔，就是這個方向</text>
  <rect class="port" x="718" y="245" width="102" height="64" rx="8"/><rect class="port" x="718" y="326" width="102" height="64" rx="8"/><rect class="port" x="718" y="426" width="102" height="86" rx="8"/>
  <text class="small" x="834" y="283">USB</text><text class="small" x="834" y="364">USB</text><text class="small" x="834" y="479">網路孔</text>

  <text class="small" x="114" y="268" fill="#fff">上排：偶數腳 2,4,6...</text>
  <text class="small" x="114" y="358" fill="#fff">下排：奇數腳 1,3,5...</text>
  <rect class="header" x="108" y="282" width="560" height="68" rx="10"/>

  <g>
    <circle class="pin" cx="123" cy="305" r="11"/><text class="num" x="123" y="305">2</text>
    <circle class="pin" cx="150" cy="305" r="11"/><text class="num" x="150" y="305">4</text>
    <circle class="gnd" cx="177" cy="305" r="11"/><text class="num" x="177" y="305">6</text>
    <circle class="pin" cx="204" cy="305" r="11"/><text class="num" x="204" y="305">8</text>
    <circle class="pin" cx="231" cy="305" r="11"/><text class="num" x="231" y="305">10</text>
    <circle class="use" cx="258" cy="305" r="12"/><text class="num" x="258" y="305">12</text>
    <circle class="gnd" cx="285" cy="305" r="11"/><text class="num" x="285" y="305">14</text>
    <circle class="use" cx="312" cy="305" r="12"/><text class="num" x="312" y="305">16</text>
    <circle class="use" cx="339" cy="305" r="12"/><text class="num" x="339" y="305">18</text>
    <circle class="gnd" cx="366" cy="305" r="11"/><text class="num" x="366" y="305">20</text>
    <circle class="pin" cx="393" cy="305" r="11"/><text class="num" x="393" y="305">22</text>
    <circle class="pin" cx="420" cy="305" r="11"/><text class="num" x="420" y="305">24</text>
    <circle class="pin" cx="447" cy="305" r="11"/><text class="num" x="447" y="305">26</text>
    <circle class="pin" cx="474" cy="305" r="11"/><text class="num" x="474" y="305">28</text>
    <circle class="gnd" cx="501" cy="305" r="11"/><text class="num" x="501" y="305">30</text>
    <circle class="pin" cx="528" cy="305" r="11"/><text class="num" x="528" y="305">32</text>
    <circle class="gnd" cx="555" cy="305" r="11"/><text class="num" x="555" y="305">34</text>
    <circle class="pin" cx="582" cy="305" r="11"/><text class="num" x="582" y="305">36</text>
    <circle class="pin" cx="609" cy="305" r="11"/><text class="num" x="609" y="305">38</text>
    <circle class="pin" cx="636" cy="305" r="11"/><text class="num" x="636" y="305">40</text>

    <circle class="v33" cx="123" cy="328" r="12"/><text class="num" x="123" y="328">1</text>
    <circle class="pin" cx="150" cy="328" r="11"/><text class="num" x="150" y="328">3</text>
    <circle class="pin" cx="177" cy="328" r="11"/><text class="num" x="177" y="328">5</text>
    <circle class="pin" cx="204" cy="328" r="11"/><text class="num" x="204" y="328">7</text>
    <circle class="gnd" cx="231" cy="328" r="11"/><text class="num" x="231" y="328">9</text>
    <circle class="use" cx="258" cy="328" r="12"/><text class="num" x="258" y="328">11</text>
    <circle class="use" cx="285" cy="328" r="12"/><text class="num" x="285" y="328">13</text>
    <circle class="use" cx="312" cy="328" r="12"/><text class="num" x="312" y="328">15</text>
    <circle class="v33" cx="339" cy="328" r="11"/><text class="num" x="339" y="328">17</text>
