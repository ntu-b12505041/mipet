    <circle class="pin" cx="393" cy="328" r="11"/><text class="num" x="393" y="328">21</text>
    <circle class="pin" cx="420" cy="328" r="11"/><text class="num" x="420" y="328">23</text>
    <circle class="gnd" cx="447" cy="328" r="11"/><text class="num" x="447" y="328">25</text>
    <circle class="pin" cx="474" cy="328" r="11"/><text class="num" x="474" y="328">27</text>
    <circle class="pin" cx="501" cy="328" r="11"/><text class="num" x="501" y="328">29</text>
    <circle class="pin" cx="528" cy="328" r="11"/><text class="num" x="528" y="328">31</text>
    <circle class="use" cx="555" cy="328" r="12"/><text class="num" x="555" y="328">33</text>
    <circle class="pin" cx="582" cy="328" r="11"/><text class="num" x="582" y="328">35</text>
    <circle class="pin" cx="609" cy="328" r="11"/><text class="num" x="609" y="328">37</text>
    <circle class="gnd" cx="636" cy="328" r="11"/><text class="num" x="636" y="328">39</text>
  </g>

  <rect x="88" y="410" width="660" height="118" rx="12" fill="#e7f7ed" stroke="#b7e0c6" stroke-width="2"/>
  <text class="small" x="112" y="442">A 馬達控制：Pin 11 GPIO17 → AIN1、Pin 13 GPIO27 → AIN2、Pin 12 GPIO18 → PWMA</text>
  <text class="small" x="112" y="474">B 馬達控制：Pin 16 GPIO23 → BIN1、Pin 18 GPIO24 → BIN2、Pin 33 GPIO13 → PWMB</text>
  <text class="small" x="112" y="506">共用：Pin 15 GPIO22 → STBY、Pin 1 3.3V → VCC、Pin 6 GND → GND</text>

  <rect class="tb" x="910" y="140" width="332" height="570" rx="16"/>
  <text class="h2" x="1024" y="188">TB6612</text>
  <text class="small" x="1008" y="216">馬達驅動板</text>

  <rect class="tbpin" x="935" y="250" width="105" height="32" rx="6"/><text class="small" x="960" y="272">VCC</text>
  <rect class="tbpin" x="935" y="290" width="105" height="32" rx="6"/><text class="small" x="960" y="312">GND</text>
  <rect class="tbpin" x="935" y="330" width="105" height="32" rx="6"/><text class="small" x="958" y="352">AIN1</text>
  <rect class="tbpin" x="935" y="370" width="105" height="32" rx="6"/><text class="small" x="958" y="392">AIN2</text>
  <rect class="tbpin" x="935" y="410" width="105" height="32" rx="6"/><text class="small" x="956" y="432">PWMA</text>
  <rect class="tbpin" x="935" y="450" width="105" height="32" rx="6"/><text class="small" x="958" y="472">STBY</text>
  <rect class="tbpin" x="935" y="490" width="105" height="32" rx="6"/><text class="small" x="958" y="512">BIN1</text>
  <rect class="tbpin" x="935" y="530" width="105" height="32" rx="6"/><text class="small" x="958" y="552">BIN2</text>
  <rect class="tbpin" x="935" y="570" width="105" height="32" rx="6"/><text class="small" x="956" y="592">PWMB</text>

  <rect class="tbpin" x="1100" y="250" width="105" height="32" rx="6"/><text class="small" x="1134" y="272">VM</text>
  <rect class="tbpin" x="1100" y="290" width="105" height="32" rx="6"/><text class="small" x="1130" y="312">GND</text>
  <rect class="tbpin" x="1100" y="370" width="105" height="32" rx="6"/><text class="small" x="1130" y="392">AO1</text>
  <rect class="tbpin" x="1100" y="410" width="105" height="32" rx="6"/><text class="small" x="1130" y="432">AO2</text>
  <rect class="tbpin" x="1100" y="520" width="105" height="32" rx="6"/><text class="small" x="1130" y="542">BO1</text>
  <rect class="tbpin" x="1100" y="560" width="105" height="32" rx="6"/><text class="small" x="1130" y="582">BO2</text>

  <path class="wire red" d="M123 328 C330 620, 800 230, 935 266" marker-end="url(#ar)"/>
  <path class="wire black" d="M177 305 C345 220, 790 285, 935 306" marker-end="url(#ab)"/>
  <path class="wire blue" d="M258 328 C485 350, 765 340, 935 346" marker-end="url(#ablue)"/>
  <path class="wire orange" d="M285 328 C500 386, 780 380, 935 386" marker-end="url(#ao)"/>
  <path class="wire green" d="M258 305 C510 430, 780 420, 935 426" marker-end="url(#ag)"/>
  <path class="wire purple" d="M312 328 C530 475, 790 460, 935 466" marker-end="url(#ap)"/>
  <path class="wire pink" d="M312 305 C535 515, 790 500, 935 506" marker-end="url(#apk)"/>
  <path class="wire teal" d="M339 305 C550 555, 790 540, 935 546" marker-end="url(#at)"/>
  <path class="wire gray" d="M555 328 C680 625, 825 580, 935 586" marker-end="url(#agy)"/>

  <text class="small" x="610" y="642" fill="#ef4444">Pin 1: 3.3V</text>
  <text class="small" x="610" y="225" fill="#111827">Pin 6: GND</text>
  <text class="small" x="610" y="360" fill="#2563eb">Pin 11: GPIO17</text>
  <text class="small" x="610" y="395" fill="#f97316">Pin 13: GPIO27</text>
  <text class="small" x="610" y="430" fill="#16a34a">Pin 12: GPIO18</text>
  <text class="small" x="610" y="475" fill="#7c3aed">Pin 15: GPIO22</text>
  <text class="small" x="610" y="520" fill="#db2777">Pin 16: GPIO23</text>
  <text class="small" x="610" y="555" fill="#0d9488">Pin 18: GPIO24</text>
  <text class="small" x="675" y="615" fill="#64748b">Pin 33: GPIO13</text>

  <rect class="motor" x="1015" y="735" width="142" height="68" rx="34"/><text class="h2" x="1048" y="777">馬達 A</text>
  <rect class="motor" x="1175" y="735" width="142" height="68" rx="34"/><text class="h2" x="1208" y="777">馬達 B</text>
  <path class="wire blue" d="M1100 386 C1050 530, 1030 650, 1070 735" marker-end="url(#ablue)"/>
  <path class="wire orange" d="M1100 426 C1090 548, 1110 650, 1102 735" marker-end="url(#ao)"/>
  <path class="wire pink" d="M1100 536 C1160 610, 1185 670, 1228 735" marker-end="url(#apk)"/>
  <path class="wire teal" d="M1100 576 C1210 610, 1245 675, 1260 735" marker-end="url(#at)"/>

  <rect class="box" x="70" y="665" width="620" height="160" rx="14"/>
  <text class="h2" x="98" y="708">電池盒</text>
  <text class="small" x="98" y="742">紅線 + → TB6612 VM</text>
  <text class="small" x="98" y="772">黑線 - → TB6612 GND</text>
  <text class="small" x="98" y="802">黑線也要和 Raspberry Pi 的 GND 共地</text>
  <path class="wire red" d="M692 742 C820 725, 1045 270, 1100 266" marker-end="url(#ar)"/>
  <path class="wire black" d="M692 772 C830 760, 1045 310, 1100 306" marker-end="url(#ab)"/>

  <rect class="warn" x="720" y="825" width="545" height="78" rx="14"/>
  <text class="small" x="748" y="858" fill="#991b1b">電池紅線不要接 Pi 的 3.3V / 5V；馬達不要直接接 Pi GPIO。</text>
  <text class="small" x="748" y="884" fill="#991b1b">如果某顆馬達方向相反，對調 AO1/AO2 或 BO1/BO2 的兩條線。</text>
</svg>
